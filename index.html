  { id: 'b4', label: 'Brush teeth & floss', emoji: '🪥' },
  { id: 'b2', label: 'Wash up', emoji: '🧼' },
  { id: 'b3', label: 'Put on pajamas', emoji: '🌙' },
  { id: 'b5', label: 'Lay out tomorrow\'s clothes', emoji: '👖' }
];

// Temporary: the original routines, used only to detect an un-customized install
// during the v2 migration in ensureToday(). Safe to delete once every device has migrated.
const TASKS_VERSION = 2;
const OLD_DEFAULT_MORNING_TASKS = [
  { id: 'm1', label: 'Make my bed', emoji: '🛏️' },
  { id: 'm2', label: 'Get dressed', emoji: '👕' },
  { id: 'm3', label: 'Brush teeth', emoji: '🪥' },
  { id: 'm4', label: 'Eat breakfast', emoji: '🥣' },
  { id: 'm5', label: 'Clean up dining table', emoji: '🍽️' }
];
const OLD_DEFAULT_BEDTIME_TASKS = [
  { id: 'b1', label: 'Tidy up toys & room', emoji: '🧸' },
  { id: 'b2', label: 'Take bath or shower', emoji: '🛁' },
  { id: 'b3', label: 'Put on pajamas', emoji: '🌙' },
  { id: 'b4', label: 'Brush teeth', emoji: '🪥' },
  { id: 'b5', label: 'Lay out tomorrow\'s clothes', emoji: '👖' }
];
function sameTasks(a, b) {
  return Array.isArray(a) && a.length === b.length &&
    a.every((t, i) => t.id === b[i].id && t.label === b[i].label && t.emoji === b[i].emoji);
}

// Prize thresholds are STAR counts (5/10/20). Keys are FIXED; only icon/label are editable in Settings.
const DEFAULT_MILESTONES = [
  { days: 5, icon: '🎬', label: 'Pick a show to watch', key: 'ms7' },
  { days: 10, icon: '🍦', label: 'Choose an ice cream flavor', key: 'ms14' },
  { days: 20, icon: '💰', label: '$20 cash or toy', key: 'ms30' }
];

// Pre-v3 prize ladder — used only to detect an un-customized install during the v3 migration.
const MODEL_VERSION = 3;
// v4 prize model: a shelf of auto-advancing jars + a stacking-prize ledger (prizesGiven).
// Supersedes the old "prizes re-open only on cash-in / a missed day spills the jar" rule.
const PRIZE_MODEL_VERSION = 4;
const OLD_DEFAULT_MILESTONES = [
  { days: 7, icon: '🎬', label: 'Pick a show to watch', key: 'ms7' },
  { days: 14, icon: '🍦', label: 'Choose an ice cream flavor', key: 'ms14' },
  { days: 30, icon: '💰', label: '$20 cash or toy', key: 'ms30' }
];
function sameMilestones(a, b) {
  return Array.isArray(a) && a.length === b.length &&
    a.every((m, i) => m.days === b[i].days && m.key === b[i].key && m.icon === b[i].icon && m.label === b[i].label);
}

const DEFAULT_TIMES = { morning: '08:00', bedtime: '20:00' };

// ═══════ Dad's notes — shown (rotating) before each grown-up approval ═══════
// Verbatim copy of cosmic-math-crunch  src/content/dadGarage.js → DAILY_NOTES (origin/main).
// Keep the two lists in sync if either side changes.
const DAD_NOTES = [
  "Being brave doesn't mean you're not scared. It means you're scared and you do it anyway.",
  "Don't rush. Slow and steady beats standing still every single time.",
  "The best time to start something? Right now. Let's go.",
  "You don't have to be better than anyone else. Just be better than yesterday-you.",
  "Smart people ask great questions. Keep asking why.",
  "You're going to mess up sometimes. That's not losing — that's learning.",
  "Be the kid who's strong AND kind. The world needs both.",
  "Your brain is like a muscle. Every hard thing you do makes it stronger.",
  "Don't just watch the game. Get in there and play it.",
  "The people who care about you will remember how you made them feel. Be warm.",
  "You don't need a lot of stuff to be happy. You need people and adventures.",
  "If someone's having a hard day, just be nice to them. That's enough.",
  "Every single person you meet knows something you don't. Pay attention.",
  "It's okay to not know the answer. Say 'I don't know' and then go find out.",
  "Hard things feel impossible right before they click. Don't quit early.",
  "Eat good food, move your body, read books. Everything else is bonus.",
  "Nobody gets good at anything without practicing when it's boring. Nobody.",
  "God gave you your own gifts. Don't waste time wishing for someone else's.",
  "When you're frustrated, take a breath. Then try one more time.",
  "The biggest adventures start with one small brave step.",
  "Try lots of things while you're young. You'll find what fits.",
  "A good friend is worth more than a hundred toys. Choose your people wisely.",
  "If you want to go far in life, bring good people with you.",
  "Rules aren't the opposite of freedom. They're how you earn it.",
  "Dad didn't have all the answers either. I just never stopped looking.",
  "Be curious about everything. Bored people aren't paying attention.",
  "Standing up for what's right is hard. Do it anyway. – Dad",
  "Listen more than you talk. Still waters run deep.",
  "Some days are tough. That's okay. Tomorrow you get to try again.",
  "I'm proud of you. Not for being perfect — for being you. – Dad",
];
const DAD_NOTE_DELAY_MS = 8000;   // approve button stays locked this long so the note gets read

// Gold/star palette for the "day complete" + "star earned" celebrations.
const STAR_CONFETTI = ['#FFD700', '#FFC83C', '#FFE488', '#FFF3CE', '#FFFFFF', '#F2A23A'];

const clone = (x) => JSON.parse(JSON.stringify(x));
let _idSeq = 0;
function genTaskId() { return 't' + Date.now().toString(36) + (_idSeq++).toString(36); }
// Labels/emoji are parent-entered, so escape before dropping into innerHTML.
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function defaultSettings() {
  return {
    tasks: { morning: clone(DEFAULT_MORNING_TASKS), bedtime: clone(DEFAULT_BEDTIME_TASKS) },
    times: clone(DEFAULT_TIMES),
    milestones: clone(DEFAULT_MILESTONES),
    pin: '8888',
    muted: false,
    theme: 'auto',
    birthday: ''
  };
}

// "8:00 AM" from a 24h "HH:MM" string.
function formatTime(hhmm) {
  const [h, m] = String(hhmm || '').split(':').map(Number);
  if (isNaN(h)) return hhmm || '';
  const ap = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(isNaN(m) ? 0 : m).padStart(2, '0')} ${ap}`;
}

// ═══════ STATE ═══════
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getToday() { return dateKey(new Date()); }      // uses the device's local date
function parseKey(k) { const [y, m, d] = k.split('-').map(Number); return new Date(y, m - 1, d); }

function loadState() {
  try {
    return JSON.parse(localStorage.getItem('starjar_state')) || null;
  } catch { return null; }
}

function saveState(state) {
  localStorage.setItem('starjar_state', JSON.stringify(state));
}

// A day snapshots the task set in force when it was created, so history stays immutable
// even after the parent edits the live task list in Settings.
function freshDayState(settings) {
  const defs = { morning: clone(settings.tasks.morning), bedtime: clone(settings.tasks.bedtime) };
  const tasks = {};
  defs.morning.forEach(t => tasks[t.id] = false);
  defs.bedtime.forEach(t => tasks[t.id] = false);
  return { tasks, taskDefs: defs, checks: { morning: false, bedtime: false } };
}

function freshMilestones(settings) {
  const m = {};
  settings.milestones.forEach(ms => m[ms.key] = { redeemed: false, pending: false });
  return m;
}

// A day earns its star only when BOTH the morning and bedtime checks are done.
function dayStarred(d) { return !!(d && d.checks && d.checks.morning && d.checks.bedtime); }

function initState(name) {
  const settings = defaultSettings();
  return {
    name,
    streak: 0,
    totalStars: 0,
    cycleBase: 0,
    prizesGiven: { ms7: 0, ms14: 0, ms30: 0 },   // stacking-prize ledger (parent hand-overs)
    jarsSeen: 0,                                  // high-water mark for the "jar full!" celebration
    settings,
    milestones: freshMilestones(settings),
    days: { [getToday()]: freshDayState(settings) }
  };
}

function ensureToday(state) {
  // ── Settings (seed/migrate FIRST — freshDayState/freshMilestones below depend on it) ──
  if (!state.settings) state.settings = {};
  const s = state.settings;
  if (typeof s.pin !== 'string') s.pin = '8888';
  if (!s.tasks || !Array.isArray(s.tasks.morning) || !Array.isArray(s.tasks.bedtime)) {
    s.tasks = { morning: clone(DEFAULT_MORNING_TASKS), bedtime: clone(DEFAULT_BEDTIME_TASKS) };
  }
  if (!s.times || typeof s.times.morning !== 'string' || typeof s.times.bedtime !== 'string') {
    s.times = clone(DEFAULT_TIMES);
  }
  if (!Array.isArray(s.milestones)) s.milestones = clone(DEFAULT_MILESTONES);
  // Mute moved from a top-level flag into settings.
  if (typeof s.muted !== 'boolean') s.muted = (typeof state.muted === 'boolean' ? state.muted : false);
  delete state.muted;
  // Theme preference (auto follows the OS setting). Seeds existing installs on next load.
  if (!['auto', 'light', 'dark'].includes(s.theme)) s.theme = 'auto';
  if (typeof s.birthday !== 'string') s.birthday = '';   // optional birthday surprise (off when blank)

  // ── v2 routines: bump task lists on devices still running the untouched originals.
  //    Custom-edited devices are left as-is; the version flag makes this run once. ──
  let _tasksMigrated = false;
  if (s.tasksVersion !== TASKS_VERSION) {
    if (sameTasks(s.tasks.morning, OLD_DEFAULT_MORNING_TASKS) &&
        sameTasks(s.tasks.bedtime, OLD_DEFAULT_BEDTIME_TASKS)) {
      s.tasks = { morning: clone(DEFAULT_MORNING_TASKS), bedtime: clone(DEFAULT_BEDTIME_TASKS) };
      _tasksMigrated = true;
    }
    s.tasksVersion = TASKS_VERSION;
  }

  // ── v3 model: split day approval into morning/bedtime checks; rebase the prize ladder to stars. ──
  if (s.modelVersion !== MODEL_VERSION) {
    for (const k in state.days) {
      const dd = state.days[k];
      if (!dd.checks) { const ap = dd.approved === true; dd.checks = { morning: ap, bedtime: ap }; }
      delete dd.approved;
    }
    if (sameMilestones(s.milestones, OLD_DEFAULT_MILESTONES)) s.milestones = clone(DEFAULT_MILESTONES);
    s.modelVersion = MODEL_VERSION;
  }

  // ── Immutability: days recorded before settings existed get the original task set ──
  for (const k in state.days) {
    if (!state.days[k].taskDefs) {
      state.days[k].taskDefs = { morning: clone(DEFAULT_MORNING_TASKS), bedtime: clone(DEFAULT_BEDTIME_TASKS) };
    }
  }

  const today = getToday();
  if (!state.days[today]) state.days[today] = freshDayState(s);
  // If today already existed pre-migration, re-point it at the new tasks (keeps checks by id).
  else if (_tasksMigrated) applySettingsToToday(state);
  // Every milestone in settings must have a runtime claim-state entry (keys are fixed,
  // but this guards renderMilestones against a missing key on any odd/old save).
  if (!state.milestones) state.milestones = freshMilestones(s);
  else s.milestones.forEach(ms => { if (!state.milestones[ms.key]) state.milestones[ms.key] = { redeemed: false, pending: false }; });
  if (typeof state.cycleBase !== 'number') state.cycleBase = 0;
  if (typeof state.dadNoteIndex !== 'number') state.dadNoteIndex = 0;   // rotating dad-note pointer
  if (typeof state.cyclesCompleted !== 'number') state.cyclesCompleted = 0;  // legacy; superseded by fullJars
  if (typeof state.lastBirthdayYear !== 'string') state.lastBirthdayYear = '';  // year the birthday moment last fired
  delete state.milestonesUnlocked;

  // ── v4 prize model: stacking-prize ledger + auto-advancing jar shelf ──
  if (!state.prizesGiven || typeof state.prizesGiven !== 'object') state.prizesGiven = {};
  s.milestones.forEach(ms => { if (typeof state.prizesGiven[ms.key] !== 'number') state.prizesGiven[ms.key] = 0; });
  if (s.prizeModelVersion !== PRIZE_MODEL_VERSION) {
    // One-shot catch-up: start every existing kid "all caught up" (owed = 0) so the parent isn't
    // told they owe a backlog for stars already banked, and seed the celebration high-water mark
    // so old saves don't fire a storm of "jar full!" popups on first load.
    syncDerived(state);                                 // populate goodDays/fullJars/currentJarFill
    const c = prizeCounts(state);
    s.milestones.forEach(ms => { state.prizesGiven[ms.key] = c[ms.key].earned; });
    state.jarsSeen = state.fullJars;
    s.prizeModelVersion = PRIZE_MODEL_VERSION;
  }
  if (typeof state.jarsSeen !== 'number') state.jarsSeen = state.fullJars || 0;
  return state;
}

// ── Derived values (computed from the day history so parent edits recompute) ──
function computeStreak(state) {
  // consecutive starred days (both checks) ending today (or yesterday, if today isn't starred yet)
  let d = new Date();
  if (!dayStarred(state.days[getToday()])) d.setDate(d.getDate() - 1);
  let s = 0;
  while (dayStarred(state.days[dateKey(d)])) { s++; d.setDate(d.getDate() - 1); }
  return s;
}

function computeTotalStars(state) {
  // Each approved day contributes its own task count (its frozen jar size).
  let n = 0;
  for (const k in state.days) {
    const d = state.days[k];
    if (dayStarred(d)) {
      const defs = d.taskDefs;
      n += defs ? (defs.morning.length + defs.bedtime.length) : 10;
    }
  }
  return n;
}

// Lifetime count of good days (NOT consecutive) — the cumulative fuel for the jar shelf.
function computeGoodDays(state) {
  let n = 0;
  for (const k in state.days) if (dayStarred(state.days[k])) n++;
  return n;
}

function computeBestStreak(state) {
  const keys = Object.keys(state.days).filter(k => dayStarred(state.days[k])).sort();
  let best = 0, cur = 0, prev = null;
  for (const k of keys) {
    if (prev) { const pd = parseKey(prev); pd.setDate(pd.getDate() + 1); cur = (dateKey(pd) === k) ? cur + 1 : 1; }
    else cur = 1;
    if (cur > best) best = cur;
    prev = k;
  }
  return best;
}

function syncDerived(state) {
  state.streak = computeStreak(state);
  state.totalStars = computeTotalStars(state);
  // Jar fill is cumulative & forgiving: every good day counts toward a 20-star jar, and the jar
  // auto-advances at 20 (a fresh one starts). A missed day no longer spills it — the streak above
  // survives only as its own 🔥 badge. fullJars are permanent trophies on the shelf.
  const goodDays = computeGoodDays(state);
  state.goodDays = goodDays;
  state.fullJars = Math.floor(goodDays / 20);     // completed trophy jars
  state.currentJarFill = goodDays % 20;           // the active jar, always 0–19
  return state;
}

// Stacking-prize ledger. Every completed jar earns all three prizes; the active jar earns the
// 5/10-star prizes as it passes them. `prizesGiven` is what the parent has actually handed over,
// so OWED = earned − given (floored at 0). Capstone (20★) only earns on a full jar.
function prizeCounts(state) {
  const list = state.settings.milestones;
  const fill = state.currentJarFill || 0, full = state.fullJars || 0;
  const out = {};
  list.forEach((ms, i) => {
    const isCapstone = (i === list.length - 1);
    const earned = isCapstone ? full : full + (fill >= ms.days ? 1 : 0);
    const given = (state.prizesGiven && state.prizesGiven[ms.key]) || 0;
    out[ms.key] = { earned, given, owed: Math.max(0, earned - given) };
  });
  return out;
}

// ═══════ ONBOARDING ═══════
const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');

nameInput.addEventListener('input', () => {
  startBtn.disabled = nameInput.value.trim().length === 0;
});

nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && nameInput.value.trim()) launchApp();
});

startBtn.addEventListener('click', launchApp);

function launchApp() {
  const name = nameInput.value.trim();
  if (!name) return;
  const state = initState(name);
  saveState(state);
  showApp(state);
}

// Module state read by render() on load — declared before INIT to avoid a temporal-dead-zone error.
let appMuted = false;
let routineToggled = { morning: null, bedtime: null }; // null = auto (by time); else explicit open/closed

// Jar entrance-animation bookkeeping (decorative only). Tracks the previously rendered
// star count / forming half so a NEW star gets a drop-in animation; if the celebration
// overlay is covering the jar, the animation is queued and played when it closes.
let _prevJarShown = null;
let _prevForming = null;
let _jarFxQueued = false;
let _numPopPending = false;

// Theme: resolve 'auto' against the OS setting, then reflect it onto <html data-theme>
// (which drives the dark CSS) and the address-bar color. Mirrors the pre-paint script in <head>.
function applyTheme(theme) {
  const dark = theme === 'dark' ||
    (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#1C1712' : '#F6EEE0');
}

// Follow the device live when it flips light/dark (only changes anything while the setting is 'auto').
// Kept at module scope so the MediaQueryList isn't garbage-collected (older WebKit drops the listener otherwise).
let _osDarkMql = null;
if (window.matchMedia) {
  _osDarkMql = matchMedia('(prefers-color-scheme: dark)');
  const onOsThemeChange = () => {
    const s = loadState();
    applyTheme((s && s.settings && s.settings.theme) || 'auto');
  };
  // addEventListener on a MediaQueryList is Safari 14+; fall back to legacy addListener on older iPads.
  if (_osDarkMql.addEventListener) _osDarkMql.addEventListener('change', onOsThemeChange);
  else if (_osDarkMql.addListener) _osDarkMql.addListener(onOsThemeChange);
}

// ═══════ INIT ═══════
const existingState = loadState();
if (existingState) {
  document.getElementById('onboarding').style.display = 'none';
  ensureToday(existingState);
  syncDerived(existingState);
  saveState(existingState);
  showApp(existingState);
}

// ═══════ MAIN RENDER ═══════
function showApp(state) {
  document.getElementById('onboarding').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('parentToggle').style.display = 'flex';
  render(state);
}

function render(state) {
  const today = getToday();
  const dayState = state.days[today];
  const checks = dayState.checks || { morning: false, bedtime: false };
  const isStarred = checks.morning && checks.bedtime;
  appMuted = !!state.settings.muted;
  applyTheme(state.settings.theme);
  const defs = dayState.taskDefs || state.settings.tasks;

  // Greeting
  const hour = new Date().getHours();
  let greetWord = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = `${greetWord}, ${state.name}!`;
  const _dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const _streakNow = state.streak || 0;
  document.getElementById('todayDate').innerHTML = escapeHtml(_dateStr) +
    (_streakNow >= 2 ? ` · <span style="color:var(--streak-flame);font-weight:800">🔥 ${_streakNow} in a row</span>` : '');

  // Whole-day-done state (both checks): dim everything
  const app = document.getElementById('app');
  app.classList.toggle('day-approved', isStarred);

  // Target times (editable in Settings)
  document.getElementById('rtMorning').textContent = formatTime(state.settings.times.morning);
  document.getElementById('rtBedtime').textContent = formatTime(state.settings.times.bedtime);

  // A routine with no tasks is hidden entirely
  setRoutineVisible('morning', defs.morning.length > 0);
  setRoutineVisible('bedtime', defs.bedtime.length > 0);

  // Tasks (today uses today's snapshot, which mirrors the live settings). A routine locks once checked.
  renderTaskList('morningTasks', defs.morning, dayState, 'morningProgress', checks.morning);
  renderTaskList('bedtimeTasks', defs.bedtime, dayState, 'bedtimeProgress', checks.bedtime);

  // Jar — the active jar fills with cumulative good-days (0–19); full jars live on the shelf
  const jarStars = state.currentJarFill || 0;
  const shown = Math.min(20, jarStars);
  let forming = null;                              // today's in-progress half-star
  if (!isStarred) {
    if (checks.morning && !checks.bedtime) forming = 'morning';
    else if (checks.bedtime && !checks.morning) forming = 'bedtime';
  }
  document.getElementById('jarStars').textContent = shown;
  renderJarStars(shown, forming);
  renderJarShelf(state);
  const jarHint = document.getElementById('jarHint');
  if (jarHint) jarHint.textContent = (shown === 0 && !forming) ? 'Your jar is ready for stars! ✨' : '';

  // Per-routine check CTAs — shown when a routine is fully ticked but not yet checked by a grown-up
  const mDone = defs.morning.length > 0 && defs.morning.every(t => dayState.tasks[t.id]);
  const bDone = defs.bedtime.length > 0 && defs.bedtime.every(t => dayState.tasks[t.id]);
  document.getElementById('checkMorningBtn').style.display = (mDone && !checks.morning) ? '' : 'none';
  document.getElementById('checkBedtimeBtn').style.display = (bDone && !checks.bedtime) ? '' : 'none';

  // Milestones
  renderMilestones(state);

  // Foreground the routine relevant to the time of day
  applyForegrounding();

  // One-time deferred celebrations/notices — shown only when the kid is actually looking
  // (not while a parent overlay or another celebration is already up). Priority: birthday → full jar.
  const _overlayUp = document.getElementById('parentOverlay').style.display === 'block'
    || document.getElementById('celebration').classList.contains('show');
  if (!_overlayUp) {
    // The show* helpers reach resetCelebrationUI(), which reads module state (dadNoteTimer)
    // declared below INIT — so the very first render (during INIT) must not call them
    // synchronously. Consume the flag now; defer the overlay one tick so init can finish.
    const nm = state.name;
    const bday = state.settings.birthday;
    if (bday && bday.length >= 10 && bday.slice(5) === today.slice(5) && state.lastBirthdayYear !== today.slice(0, 4)) {
      state.lastBirthdayYear = today.slice(0, 4);
      saveState(state);
      setTimeout(() => showBirthday(nm), 0);
    } else if (state.fullJars > (state.jarsSeen || 0)) {
      // A jar just auto-completed — celebrate once, then catch the high-water mark up so a
      // multi-jar jump (e.g. parent backfills days) fires a single popup, not a storm.
      state.jarsSeen = state.fullJars;
      saveState(state);
      setTimeout(() => showJarComplete(nm, state.fullJars), 0);
    }
  }
}

function setRoutineVisible(r, visible) {
  const block = document.getElementById(r + 'Block');
  if (block) block.style.display = visible ? '' : 'none';
}

function renderTaskList(containerId, tasks, dayState, progressId, disabled) {
  const container = document.getElementById(containerId);
  const done = tasks.filter(t => dayState.tasks[t.id]).length;
  const pill = document.getElementById(progressId);
  pill.textContent = `${done}/${tasks.length}`;
  pill.classList.toggle('complete', tasks.length > 0 && done === tasks.length);

  container.innerHTML = tasks.map(task => {
    const checked = dayState.tasks[task.id];
    return `
      <li class="task-item ${checked ? 'done' : ''}${disabled ? ' locked' : ''}" data-task="${task.id}" onclick="${disabled ? '' : `toggleTask('${task.id}', this)`}">
        <div class="task-checkbox ${checked ? 'checked' : ''}">
          <span class="check-icon">✓</span>
        </div>
        <span class="task-label">${escapeHtml(task.emoji)} ${escapeHtml(task.label)}</span>
      </li>
    `;
  }).join('');
}

function toggleTask(taskId, el) {
  const state = ensureToday(loadState());
  const today = getToday();
  const ds = state.days[today];
  const defs = ds.taskDefs;
  const which = defs.morning.some(t => t.id === taskId) ? 'morning' : 'bedtime';
  if (ds.checks && ds.checks[which]) return;   // a routine locks once a grown-up has checked it

  const beforeDone = defs[which].every(t => ds.tasks[t.id]);
  const newVal = !ds.tasks[taskId];
  ds.tasks[taskId] = newVal;
  saveState(state);
  render(state);

  if (newVal) {
    flashCheckbox(taskId);   // satisfying "thunk"
    spawnCheckBurst(taskId); // tiny gold-star burst
    chimeCheck();
    buzz(18);
    // when a routine becomes fully ticked, nudge to get it checked (its CTA appears)
    if (defs[which].length && !beforeDone && defs[which].every(t => ds.tasks[t.id])) cueRoutine(which);
  }
}

function flashCheckbox(taskId) {
  const box = document.querySelector(`[data-task="${taskId}"] .task-checkbox`);
  if (!box) return;
  box.classList.add('justchecked');
  setTimeout(() => box.classList.remove('justchecked'), 600);
}

// Tiny gold-star burst from the box that was just ticked (decorative only).
// Uses the Web Animations API, so it guards reduced-motion explicitly — the
// global CSS reduced-motion rule doesn't reach element.animate().
function spawnCheckBurst(taskId) {
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const box = document.querySelector(`[data-task="${taskId}"] .task-checkbox`);
  if (!box) return;
  const r = box.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'burst-star';
    el.innerHTML = STAR_SVG;
    const size = 8 + Math.random() * 7;
    el.style.width = el.style.height = size.toFixed(1) + 'px';
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    document.body.appendChild(el);
    const ang = (i / 6) * Math.PI * 2 + Math.random() * 0.7;
    const dx = Math.cos(ang) * (26 + Math.random() * 24);
    const dy = Math.sin(ang) * (26 + Math.random() * 24) - 10;
    const dur = 480 + Math.random() * 180;
    el.animate([
      { transform: 'translate(-50%, -50%) scale(0.3) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx.toFixed(1)}px), calc(-50% + ${dy.toFixed(1)}px)) scale(1) rotate(${Math.round(Math.random() * 140 - 70)}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' });
    setTimeout(() => el.remove(), dur + 60);
  }
}

// ═══════ FEEDBACK & FOREGROUNDING ═══════
// (appMuted + routineToggled are declared just above INIT, since render() reads them on load)

// Sound — synthesized via WebAudio, no audio files (keeps the single-file app).
let _actx = null;
function _audio() {
  if (_actx === null) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch { _actx = false; } }
  return _actx || null;
}
function playTone(freqs, dur, gainPeak) {
  if (appMuted) return;
  const ctx = _audio();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch {} }
  const t0 = ctx.currentTime;
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    const s = t0 + i * 0.075;
    g.gain.setValueAtTime(0.0001, s);
    g.gain.exponentialRampToValueAtTime(gainPeak, s + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, s + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(s); osc.stop(s + dur + 0.03);
  });
}
function chimeCheck()   { playTone([660, 880], 0.16, 0.12); }
function chimeRoutine() { playTone([660, 880, 1047], 0.20, 0.12); }
function chimeDay()     { playTone([523, 659, 784, 1047], 0.30, 0.14); }
// Haptics (Android/Chrome; iOS Safari has no web vibration — degrades silently).
function buzz(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch {} } }

// Completion toast (small, non-takeover cue)
let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Big "whole day done" celebration — distinct from milestone confetti (gold/star palette).
function celebrateDay(name) {
  resetCelebrationUI();
  document.getElementById('celebIcon').textContent = '🌟';
  document.getElementById('celebTitle').textContent = 'Day Complete!';
  document.getElementById('celebText').textContent = `Every star earned today${name ? ', ' + name : ''}! 🎉`;
  document.querySelector('.celebration-close').textContent = 'Yay! ⭐';
  document.getElementById('celebration').classList.add('show');
  spawnConfetti(STAR_CONFETTI);
  chimeDay();
  buzz([30, 40, 30, 40, 70]);
}
function cueRoutine(which) {
  showToast(which === 'morning' ? 'Morning all done! ☀️' : 'Bedtime all done! 🌙');
  chimeRoutine();
  buzz([20, 30, 20]);
}

// Time-of-day foregrounding: show the relevant routine, collapse/dim the other.
function currentRoutine() { return new Date().getHours() < 14 ? 'morning' : 'bedtime'; }
function isRoutineOpen(r) {
  return routineToggled[r] !== null ? routineToggled[r] : (currentRoutine() === r);
}
function applyForegrounding() {
  ['morning', 'bedtime'].forEach(r => {
    const block = document.getElementById(r + 'Block');
    if (block) block.classList.toggle('deemph', !isRoutineOpen(r));
  });
}
function toggleRoutine(r) {
  routineToggled[r] = !isRoutineOpen(r);
  applyForegrounding();
}

// ═══════ PIN (gates kid approval + parent zone) ═══════
let pinEntry = '';
let pinMode = null;   // 'morning' | 'bedtime' | 'parent'
let dadNoteTimer = null;   // interval id for the dad-note read-gate countdown

// A "note from Dad" read-gate shown before the grown-up PIN check. The approve button stays
// locked for DAD_NOTE_DELAY_MS so the note actually gets read, then hands off to the unchanged
// openPin() flow. One note per half-star, memoized on the day record so re-taps (or "Not yet")
// re-show the SAME note — the global pointer only advances the first time a half-star is claimed.
function dadNoteFor(state, mode) {
  const day = state.days[getToday()];
  if (!day.dadNote) day.dadNote = {};
  if (typeof day.dadNote[mode] === 'number') return DAD_NOTES[day.dadNote[mode] % DAD_NOTES.length];
  const idx = (typeof state.dadNoteIndex === 'number' ? state.dadNoteIndex : 0) % DAD_NOTES.length;
  day.dadNote[mode] = idx;
  state.dadNoteIndex = (idx + 1) % DAD_NOTES.length;
  saveState(state);
  return DAD_NOTES[idx];
}

function showDadNote(mode) {
  const state = ensureToday(loadState());
  resetCelebrationUI();
  document.getElementById('celebIcon').textContent = '💛';
  document.getElementById('celebTitle').textContent = 'A note from Dad';
  document.getElementById('celebText').textContent = dadNoteFor(state, mode);
  const action = document.getElementById('celebActionBtn');
  const readyLabel = mode === 'bedtime' ? 'Ask a grown-up to check 🌙' : 'Ask a grown-up to check ☀️';
  action.onclick = () => openPin(mode);     // disabled buttons don't fire clicks, so the countdown gates this
  action.disabled = true;
  action.style.display = '';
  document.querySelector('.celebration-close').textContent = 'Not yet';
  document.getElementById('celebration').classList.add('show');
  // Lock + count down so the note gets read before the approve button unlocks.
  let left = Math.ceil(DAD_NOTE_DELAY_MS / 1000);
  action.textContent = `Read it… ${left}`;
  if (dadNoteTimer) clearInterval(dadNoteTimer);
  dadNoteTimer = setInterval(() => {
    left--;
    if (left > 0) { action.textContent = `Read it… ${left}`; return; }
    clearInterval(dadNoteTimer);
    dadNoteTimer = null;
    action.disabled = false;
    action.textContent = readyLabel;
  }, 1000);
}

function openPin(mode) {
  resetCelebrationUI();
  pinMode = mode;
  pinEntry = '';
  document.getElementById('celebIcon').textContent = '🔒';
  document.getElementById('celebTitle').textContent =
    mode === 'morning' ? 'Morning Check ☀️' : mode === 'bedtime' ? 'Bedtime Check 🌙' : 'Grown-Ups Only';
  document.getElementById('celebText').textContent =
    mode === 'parent' ? 'Enter the grown-up code' : 'Ask a grown-up to enter the code';
  document.getElementById('pinPad').style.display = 'flex';
  document.querySelector('.celebration-close').textContent = 'Cancel';
  renderPinDots();
  document.getElementById('celebration').classList.add('show');
}

function renderPinDots() {
  document.getElementById('pinDots').innerHTML =
    [0, 1, 2, 3].map(i => `<span class="pin-dot ${i < pinEntry.length ? 'filled' : ''}"></span>`).join('');
}

function pinKey(d) {
  document.getElementById('pinMsg').textContent = '';
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  renderPinDots();
  buzz(8);
  if (pinEntry.length === 4) setTimeout(verifyPin, 200);
}
function pinBack() { pinEntry = pinEntry.slice(0, -1); renderPinDots(); }
function pinClear() { pinEntry = ''; renderPinDots(); document.getElementById('pinMsg').textContent = ''; }

function verifyPin() {
  const state = ensureToday(loadState());
  const correct = (state.settings && state.settings.pin) || '8888';
  if (pinEntry !== correct) { pinFail(); return; }
  const mode = pinMode;
  pinMode = null;
  pinEntry = '';
  if (mode === 'morning' || mode === 'bedtime') approveRoutineAfterPin(state, mode);
  else { closeCelebration(); openParentZone(); }
}

function pinFail() {
  const pad = document.getElementById('pinPad');
  document.getElementById('pinMsg').textContent = 'Oops — try again';
  pad.classList.remove('shake'); void pad.offsetWidth; pad.classList.add('shake');
  buzz([40, 60, 40]);
  pinEntry = '';
  setTimeout(renderPinDots, 130);
}

// Correct PIN on a routine check → that half-star lights; both halves bank the day's whole star.
function approveRoutineAfterPin(state, which) {
  const today = getToday();
  const day = state.days[today];
  if (!day.checks) day.checks = { morning: false, bedtime: false };
  day.checks[which] = true;
  const whole = day.checks.morning && day.checks.bedtime;
  syncDerived(state);
  saveState(state);
  render(state);
  // morph the same overlay into a celebration
  resetCelebrationUI();
  if (whole) {
    document.getElementById('celebIcon').textContent = '⭐';
    document.getElementById('celebTitle').textContent = "Today's star! ⭐";
    document.getElementById('celebText').textContent = `Great day, ${state.name} — one more star in the jar!`;
    document.querySelector('.celebration-close').textContent = 'Yay! ⭐';
    spawnConfetti(STAR_CONFETTI);
    chimeDay();
    buzz([30, 40, 30, 40, 70]);
    popJar();
  } else {
    const sun = which === 'morning';
    document.getElementById('celebIcon').textContent = sun ? '☀️' : '🌙';
    document.getElementById('celebTitle').textContent = sun ? 'Morning star!' : 'Bedtime star!';
    document.getElementById('celebText').textContent = sun
      ? `Half a star, ${state.name} — finish bedtime for the whole one! ⭐`
      : `Half a star, ${state.name} — finish your morning for the whole one! ⭐`;
    document.querySelector('.celebration-close').textContent = 'Yay! ⭐';
    spawnConfetti(STAR_CONFETTI);
    chimeRoutine();
    buzz([20, 30, 20]);
  }
}

// Gentle, no-confetti notice shown once after a missed day spills the jar.
// A jar just auto-completed (the kid passed another multiple of 20) — the KID's big
// "you filled it!" moment, deferred until they're next looking at the app (see the drain in render()).
function showJarComplete(name, n) {
  resetCelebrationUI();
  document.getElementById('celebIcon').textContent = '🫙';
  document.getElementById('celebTitle').textContent = (n > 1) ? `Jar #${n} full! 🏆` : 'You filled the whole jar! 🏆';
  document.getElementById('celebText').textContent = `Twenty stars${name ? ', ' + name : ''} — amazing! A fresh jar starts now.`;
  document.querySelector('.celebration-close').textContent = 'Yay! ⭐';
  document.getElementById('celebration').classList.add('show');
  spawnConfetti(STAR_CONFETTI);
  chimeDay();
  buzz([30, 40, 30, 40, 70]);
}

// Optional once-a-year birthday surprise — only fires when a birthday is set in Settings.
function showBirthday(name) {
  resetCelebrationUI();
  document.getElementById('celebIcon').textContent = '🎂';
  document.getElementById('celebTitle').textContent = `Happy Birthday${name ? ', ' + name : ''}! 🎉`;
  document.getElementById('celebText').textContent = 'Hope your day is full of stars.';
  document.querySelector('.celebration-close').textContent = 'Yay! 🎈';
  document.getElementById('celebration').classList.add('show');
  spawnConfetti(['#FFD700', '#FFC83C', '#FFE488', '#8BBE72', '#C9B6EC', '#F2762E', '#FFFFFF']);
  chimeDay();
  buzz([30, 40, 30, 40, 70]);
}

// ═══════ STAR ANIMATION ═══════
const STAR_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2 L14.9 8.6 L22 9.2 L16.6 14 L18.3 21 L12 17.3 L5.7 21 L7.4 14 L2 9.2 L9.1 8.6 Z" fill="#FFC83C" stroke="#E0902A" stroke-width="0.6" stroke-linejoin="round"/></svg>';

function popJar() {
  const jarC = document.querySelector('.jar-container');
  if (!jarC) return;
  jarC.classList.remove('jar-pop');
  void jarC.offsetWidth;          // restart the animation
  jarC.classList.add('jar-pop');
}

function animateStarToJar(taskEl) {
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) {
    popJar();
    return;
  }

  const cb = taskEl.querySelector('.task-checkbox') || taskEl;
  const rect = cb.getBoundingClientRect();
  const jarRect = document.getElementById('jarSvg').getBoundingClientRect();

  const sx = rect.left + rect.width / 2;
  const sy = rect.top + rect.height / 2;
  const ex = jarRect.left + jarRect.width / 2;
  const ey = jarRect.top + jarRect.height * 0.52;

  // arc up and over into the jar
  const cx = (sx + ex) / 2;
  const cy = Math.min(sy, ey) - Math.max(72, Math.abs(ex - sx) * 0.32);
  const pathStr = `path('M ${sx} ${sy} Q ${cx} ${cy} ${ex} ${ey}')`;

  const DUR = 760;
  const supportsPath = window.CSS && CSS.supports && CSS.supports('offset-path', "path('M0 0 L1 1')");

  const star = document.createElement('div');
  star.className = 'flying-star';
  star.innerHTML = STAR_SVG;

  if (supportsPath) {
    star.style.offsetPath = pathStr;
    star.style.offsetRotate = '0deg';
    document.body.appendChild(star);
    star.animate([
      { offsetDistance: '0%',   transform: 'translate(-50%,-50%) scale(0.5) rotate(-30deg)', opacity: 0 },
      { offsetDistance: '12%',  transform: 'translate(-50%,-50%) scale(1.2) rotate(-16deg)', opacity: 1, offset: 0.15 },
      { offsetDistance: '82%',  transform: 'translate(-50%,-50%) scale(1.0) rotate(10deg)',  opacity: 1, offset: 0.8 },
      { offsetDistance: '100%', transform: 'translate(-50%,-50%) scale(0.42) rotate(22deg)', opacity: 0 }
    ], { duration: DUR, easing: 'cubic-bezier(0.45, 0, 0.25, 1)', fill: 'forwards' });

    // sparkle trail tracing the same arc, just behind the star
    for (let i = 0; i < 6; i++) {
      const sp = document.createElement('div');
      sp.className = 'fly-sparkle';
      sp.style.offsetPath = pathStr;
      document.body.appendChild(sp);
      const delay = 70 + i * 38;
      sp.animate([
        { offsetDistance: '0%',  transform: 'translate(-50%,-50%) scale(1)', opacity: 0.9 },
        { offsetDistance: '84%', transform: `translate(-50%,-50%) scale(${0.3 + Math.random() * 0.3})`, opacity: 0 }
      ], { duration: DUR - delay, delay, easing: 'cubic-bezier(0.45,0,0.25,1)', fill: 'forwards' });
      setTimeout(() => sp.remove(), DUR + 60);
    }
  } else {
    // fallback: faux-arc with a mid keyframe
    star.style.left = sx + 'px';
    star.style.top = sy + 'px';
    document.body.appendChild(star);
    const dx = ex - sx, dy = ey - sy;
    star.animate([
      { transform: 'translate(-50%,-50%) scale(1.1)', opacity: 0 },
      { transform: `translate(calc(-50% + ${dx * 0.5}px), calc(-50% + ${dy * 0.5 - 72}px)) scale(1.15)`, opacity: 1, offset: 0.5 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.42)`, opacity: 0 }
    ], { duration: DUR, easing: 'cubic-bezier(0.45,0,0.25,1)', fill: 'forwards' });
  }

  setTimeout(popJar, DUR - 130);
  setTimeout(() => star.remove(), DUR + 60);
}

// ═══════ JAR RENDERING ═══════
// Lay out `total` star slots bottom-up in a centered cluster, sized to fit the jar.
// The first `count` are revealed, so slots never shift as the jar fills.
function jarStarLayout(total) {
  const CX = 80, X_HALF = 36;      // center x, max half-width for star centers
  const Y_BOT = 176, Y_TOP = 72;   // center-y of bottom & top rows (taller spread → bigger stars)
  if (total <= 0) return { positions: [], size: 20 };
  const cols = Math.max(2, Math.min(4, Math.ceil(Math.sqrt(total))));
  const rows = Math.ceil(total / cols);
  const colStep = (2 * X_HALF) / (cols - 1);
  const rowGap = rows > 1 ? Math.min((Y_BOT - Y_TOP) / (rows - 1), 30) : 0;
  let size = rows > 1 ? Math.min(26, rowGap * 0.82, colStep * 0.9) : 22;
  size = Math.max(10, size);

  // Build bottom-up, each row centered as a group, filled center-out so the
  // first few stars (a partly-done day) sit balanced under the jar's middle.
  const positions = [];
  let placed = 0;
  for (let row = 0; row < rows && placed < total; row++) {
    const inRow = Math.min(cols, total - placed);
    const y = Y_BOT - row * rowGap;
    const startX = CX - ((inRow - 1) * colStep) / 2;
    const xs = [];
    for (let c = 0; c < inRow; c++) xs.push(startX + c * colStep);
    const order = [...xs.keys()].sort((a, b) => Math.abs(a - (inRow - 1) / 2) - Math.abs(b - (inRow - 1) / 2));
    order.forEach((c, k) => {
      const jitter = (((placed + k) * 37) % 5) - 2;     // subtle deterministic wobble
      positions.push({ x: xs[c] + jitter, y });
    });
    placed += inRow;
  }
  return { positions, size };
}

function renderJarStars(shown, forming) {
  const SVGNS = 'http://www.w3.org/2000/svg';
  const fill = document.getElementById('starFill');
  const warm = document.getElementById('warmFillRect');
  fill.innerHTML = '';

  const CAP = 20;
  shown = Math.max(0, Math.min(CAP, shown | 0));

  // Entrance bookkeeping (decorative): stars beyond the previously rendered count get a
  // drop-in animation; a newly appeared forming half fades in. First render = no animation.
  const grewFrom = (_prevJarShown !== null && shown > _prevJarShown) ? _prevJarShown : null;
  const formingNew = !!forming && forming !== _prevForming;
  _prevJarShown = shown;
  _prevForming = forming || null;

  // rising warm-light pool, proportional to how full the jar is (toward the 20-star grand prize)
  const maxHeight = 150;
  const ratio = Math.max(0, Math.min(1, shown / CAP));
  const fillHeight = ratio * maxHeight;
  if (warm) {
    warm.setAttribute('y', String(190 - fillHeight));
    warm.setAttribute('height', String(fillHeight));
  }

  const { positions, size } = jarStarLayout(CAP);
  const n = Math.min(shown, positions.length);
  for (let i = 0; i < n; i++) {
    const pos = positions[i];

    // static group sets the position; an entrance wrapper plays the drop-in; inner group bobs
    const pivot = document.createElementNS(SVGNS, 'g');
    pivot.setAttribute('transform', `translate(${pos.x} ${pos.y})`);

    const enterG = document.createElementNS(SVGNS, 'g');
    if (grewFrom !== null && i >= grewFrom) {
      enterG.setAttribute('data-land', '1');                                  // class applied by playJarEntrances
      enterG.style.animationDelay = ((i - grewFrom) * 0.12).toFixed(2) + 's'; // cascade if several banked at once
    }

    const floatG = document.createElementNS(SVGNS, 'g');
    floatG.setAttribute('class', 'jar-star');
    floatG.style.animation = `starFloat ${(3 + (i % 4) * 0.55).toFixed(2)}s ease-in-out ${(i * 0.31).toFixed(2)}s infinite`;

    const glow = document.createElementNS(SVGNS, 'circle');
    glow.setAttribute('class', 's-glow');
    glow.setAttribute('cx', '0');
    glow.setAttribute('cy', '0');
    glow.setAttribute('r', String((size * 0.55).toFixed(2)));
    glow.setAttribute('fill', 'url(#starGlow)');
    glow.style.animation = `starGlowPulse ${(2.6 + (i % 3) * 0.5).toFixed(2)}s ease-in-out ${(i * 0.22).toFixed(2)}s infinite`;
    floatG.appendChild(glow);

    const star = document.createElementNS(SVGNS, 'use');
    star.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#jarStar');
    star.setAttribute('href', '#jarStar');
    star.setAttribute('class', 's-star');
    star.setAttribute('x', String(-size / 2));
    star.setAttribute('y', String(-size / 2));
    star.setAttribute('width', String(size));
    star.setAttribute('height', String(size));
    star.style.animation = `starPulse ${(2.4 + (i % 3) * 0.5).toFixed(2)}s ease-in-out ${(i * 0.18).toFixed(2)}s infinite`;
    floatG.appendChild(star);

    enterG.appendChild(floatG);
    pivot.appendChild(enterG);
    fill.appendChild(pivot);
  }

  // today's in-progress star: a faint outline in the next slot with the earned half lit
  if (forming && n < positions.length) {
    const pos = positions[n];
    const half = forming === 'morning' ? 'url(#halfL)' : 'url(#halfR)';
    [true, false].forEach((ghost) => {
      const pivot = document.createElementNS(SVGNS, 'g');
      pivot.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
      const enterG = document.createElementNS(SVGNS, 'g');
      if (formingNew) enterG.setAttribute('data-form', '1');
      const star = document.createElementNS(SVGNS, 'use');
      star.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#jarStar');
      star.setAttribute('href', '#jarStar');
      star.setAttribute('class', 's-star');
      star.setAttribute('x', String(-size / 2));
      star.setAttribute('y', String(-size / 2));
      star.setAttribute('width', String(size));
      star.setAttribute('height', String(size));
      if (ghost) star.setAttribute('opacity', '0.26');
      else star.setAttribute('clip-path', half);
      enterG.appendChild(star);
      pivot.appendChild(enterG);
      fill.appendChild(pivot);
    });
  }

  // Play the entrances now — or, if the celebration overlay is covering the jar,
  // queue them so the kid actually sees the star land (drained by closeCelebration).
  if (grewFrom !== null) _numPopPending = true;
  if (grewFrom !== null || formingNew) {
    const celebShowing = document.getElementById('celebration').classList.contains('show');
    if (celebShowing) _jarFxQueued = true;
    else playJarEntrances();
  }
}

// Swap the entrance markers set by renderJarStars for their animation classes, and pop
// the star-count number if it just went up. Safe to call when nothing is marked.
function playJarEntrances() {
  _jarFxQueued = false;
  document.querySelectorAll('#starFill [data-land]').forEach(g => { g.removeAttribute('data-land'); g.classList.add('star-enter'); });
  document.querySelectorAll('#starFill [data-form]').forEach(g => { g.removeAttribute('data-form'); g.classList.add('star-enter-soft'); });
  if (_numPopPending) {
    _numPopPending = false;
    const el = document.getElementById('jarStars');
    if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  }
}

// ═══════ MILESTONES ═══════
// The shelf of completed trophy jars, shown under the active jar. Caps the glyph row and
// switches to a "×N" pill once there are too many to line up.
function renderJarShelf(state) {
  const shelf = document.getElementById('jarShelf');
  if (!shelf) return;
  const n = state.fullJars || 0;
  if (n <= 0) { shelf.style.display = 'none'; shelf.innerHTML = ''; return; }
  shelf.style.display = '';
  const CAP = 6;
  let html = '';
  const glyphs = (n <= CAP) ? n : CAP - 1;
  for (let i = 0; i < glyphs; i++) html += '<span class="shelf-jar">🫙</span>';
  if (n > CAP) html += `<span class="shelf-more">×${n}</span>`;
  shelf.innerHTML = html;
}

// Milestone cards + owed summary, driven by the stacking-prize ledger (prizeCounts).
function renderMilestones(state) {
  const counts = prizeCounts(state);
  const fill = state.currentJarFill || 0;
  const grid = document.getElementById('milestonesGrid');
  grid.innerHTML = state.settings.milestones.map(ms => {
    const owed = counts[ms.key].owed;
    let cls = '', footer, tap = '';
    if (owed > 0) {
      cls = 'unlocked ready';
      footer = `<div class="milestone-cta">🎁 ${owed > 1 ? '×' + owed + ' ready!' : 'Ready!'}</div>`;
      tap = `onclick="openClaim('${ms.key}')"`;
    } else {
      let d = ms.days - fill; if (d <= 0) d += 20;     // stars until the NEXT one of this prize
      footer = `<div class="milestone-progress">${d} ${d === 1 ? 'star' : 'stars'} to go</div>`;
    }
    return `
      <div class="milestone-card ${cls}" ${tap}>
        <div class="milestone-icon">${escapeHtml(ms.icon)}</div>
        <div class="milestone-days">${ms.days} stars</div>
        <div class="milestone-label">${escapeHtml(ms.label)}</div>
        ${footer}
      </div>
    `;
  }).join('');

  // Owed summary strip — only the tiers with a prize waiting to be claimed.
  const tally = document.getElementById('prizeTally');
  if (tally) {
    const owedList = state.settings.milestones.filter(ms => counts[ms.key].owed > 0);
    if (owedList.length) {
      tally.style.display = '';
      tally.innerHTML = `<span class="prize-tally-lbl">🎁 Ready for you:</span>` +
        owedList.map(ms => `<span class="prize-tally-item">${escapeHtml(ms.icon)} ×${counts[ms.key].owed}</span>`).join('');
    } else {
      tally.style.display = 'none';
      tally.innerHTML = '';
    }
  }
}

// ═══════ PARENT ZONE ═══════
const parentToggle = document.getElementById('parentToggle');
// A single tap opens the PIN prompt; the correct PIN reveals the dashboard.
parentToggle.addEventListener('click', () => openPin('parent'));

let pzMonth = null;     // first-of-month Date shown in the calendar
let pzSelected = null;  // currently selected day key, or null
let pzView = 'dashboard';   // 'dashboard' | 'settings'
let settingsDraft = null;   // working copy while the Settings form is open

function openParentZone() {
  const t = new Date();
  pzMonth = new Date(t.getFullYear(), t.getMonth(), 1);
  pzSelected = getToday();
  pzView = 'dashboard';
  document.getElementById('parentOverlay').style.display = 'block';
  renderParentPanel();
}

function pzSwitch(view) {
  pzView = view;
  if (view === 'settings') settingsDraft = clone(ensureToday(loadState()).settings);
  else { const s = loadState(); applyTheme((s && s.settings && s.settings.theme) || 'auto'); }  // drop unsaved theme preview
  renderParentPanel();
}

function renderParentPanel() {
  const state = ensureToday(loadState());
  syncDerived(state);
  saveState(state);

  const tabs = `
    <div class="pz-tabs">
      <button class="pz-tab ${pzView === 'dashboard' ? 'active' : ''}" onclick="pzSwitch('dashboard')">📅 Dashboard</button>
      <button class="pz-tab ${pzView === 'settings' ? 'active' : ''}" onclick="pzSwitch('settings')">⚙️ Settings</button>
    </div>`;
  const body = pzView === 'settings' ? renderSettingsForm() : renderDashboard(state);
  document.getElementById('parentPanel').innerHTML =
    `<button class="close-parent" onclick="closeParentZone()">✕</button>` + tabs + body;
}

function renderDashboard(state) {
  const today = getToday();
  const monthName = pzMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const pc = prizeCounts(state);
  const anyPrize = state.settings.milestones.some(ms => pc[ms.key].owed > 0 || pc[ms.key].given > 0);
  const CHIP_CAP = 6;   // show one check-off box per owed prize, up to this many, then a "+N more"
  const prizesSection = anyPrize ? `
    <div class="pz-prizes">
      <div class="pz-prizes-title">🎁 Prizes to give</div>
      ${state.settings.milestones.map(ms => {
        const c = pc[ms.key];
        let chips = '';
        if (c.owed > 0) {
          const shown = Math.min(c.owed, CHIP_CAP);
          for (let i = 0; i < shown; i++) chips += `<button class="pz-give-chip" onclick="pzGivePrize('${ms.key}')">☐ Gave it</button>`;
          if (c.owed > CHIP_CAP) chips += `<span class="pz-give-more">+${c.owed - CHIP_CAP} more</span>`;
          if (c.owed > 1) chips += `<button class="pz-give-chip all" onclick="pzGiveAllPrize('${ms.key}')">Gave all ${c.owed} ✓</button>`;
        }
        const undo = c.given > 0 ? `<button class="pz-give-undo" onclick="pzUndoPrize('${ms.key}')">↩︎ undo one</button>` : '';
        const summary = c.owed > 0
          ? `<b class="owed">${c.owed} to give</b>${c.given > 0 ? ` · ${c.given} given` : ''}`
          : `all ${c.given} given ✓`;
        return `
        <div class="pz-prize-row">
          <div class="pz-prize-head">
            <span class="pz-prize-info">${escapeHtml(ms.icon)} ${escapeHtml(ms.label)}</span>
            <span class="pz-prize-counts">${summary}</span>
          </div>
          ${chips ? `<div class="pz-give-chips">${chips}</div>` : ''}
          ${undo ? `<div class="pz-give-foot">${undo}</div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';
  const monthApproved = Object.keys(state.days).filter(k => {
    const d = parseKey(k);
    return dayStarred(state.days[k]) && d.getMonth() === pzMonth.getMonth() && d.getFullYear() === pzMonth.getFullYear();
  }).length;

  return `
    <h2>Parent Dashboard</h2>
    <div class="date-label">${escapeHtml(state.name)}'s progress · ${monthApproved} star ${monthApproved === 1 ? 'day' : 'days'} this month</div>

    <div class="pz-stats">
      <div class="pz-stat pz-stat-jar"><div class="pz-stat-num">⭐ ${state.currentJarFill || 0} / 20</div><div class="pz-stat-lbl">Stars in the jar</div></div>
      <div class="pz-stat"><div class="pz-stat-num">🏆 ${computeBestStreak(state)}</div><div class="pz-stat-lbl">Best run</div></div>
      ${state.fullJars ? `<div class="pz-stat"><div class="pz-stat-num">🫙 ${state.fullJars}</div><div class="pz-stat-lbl">${state.fullJars === 1 ? 'Jar filled' : 'Jars filled'}</div></div>` : ''}
    </div>
    ${prizesSection}

    <div class="pz-cal-head">
      <button class="pz-nav" onclick="pzNav(-1)">‹</button>
      <div class="pz-month">${monthName}</div>
      <button class="pz-nav" onclick="pzNav(1)">›</button>
    </div>
    <div class="pz-cal-grid pz-weekdays">${['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => `<div class="pz-weekday">${d}</div>`).join('')}</div>
    <div class="pz-cal-grid">${buildCalendarCells(state, today)}</div>

    <div class="pz-legend">
      <span><i class="dot approved"></i>Star day</span>
      <span><i class="dot partial"></i>Partial</span>
      <span class="pz-hint">tap a day to edit</span>
    </div>

    ${pzSelected ? buildDayDetail(state, pzSelected, today) : ''}

    <div class="reset-link" onclick="confirmReset()">Reset all data</div>
  `;
}

// ═══════ SETTINGS FORM (PIN-gated, inside the parent zone) ═══════
function renderSettingsForm() {
  const d = settingsDraft;
  const taskGroup = (routine, label, icon) => `
    <div class="set-group">
      <div class="set-grouphead">${icon} ${label}</div>
      <div class="set-tasks">
        ${d.tasks[routine].map((t, i) => `
          <div class="set-task-row">
            <input class="set-emoji" value="${escapeHtml(t.emoji)}" maxlength="4" oninput="setTaskField('${routine}',${i},'emoji',this.value)">
            <input class="set-label" value="${escapeHtml(t.label)}" maxlength="28" placeholder="Task name" oninput="setTaskField('${routine}',${i},'label',this.value)">
            <button class="set-remove" onclick="removeTask('${routine}',${i})" aria-label="Remove">✕</button>
          </div>`).join('')}
      </div>
      <button class="set-add" onclick="addTask('${routine}')">＋ Add task</button>

    <div class="set-ms-row">
      <span class="set-ms-days">${ms.days} stars</span>
      <input class="set-emoji" value="${escapeHtml(ms.icon)}" maxlength="4" oninput="setMsField(${i},'icon',this.value)">
      <input class="set-label" value="${escapeHtml(ms.label)}" maxlength="30" placeholder="Reward" oninput="setMsField(${i},'label',this.value)">

  return `
    <h2>Settings</h2>
    <div class="date-label">Changes apply going forward — past days keep their tasks.</div>

    <div class="set-section-title">Routines</div>
    ${taskGroup('morning', 'Morning', '☀️')}
    ${taskGroup('bedtime', 'Bedtime', '🌙')}

    <div class="set-section-title">Target times</div>
    <div class="set-times">
      <label class="set-time"><span>☀️ Morning by</span><input type="time" value="${escapeHtml(d.times.morning)}" oninput="setTime('morning',this.value)"></label>
      <label class="set-time"><span>🌙 Bedtime by</span><input type="time" value="${escapeHtml(d.times.bedtime)}" oninput="setTime('bedtime',this.value)"></label>
    </div>

    <div class="set-section-title">Milestone rewards</div>
    <div class="date-label">Edit the prize — the 5 / 10 / 20-star goals stay fixed.</div>
    <div class="set-ms">${msRows}</div>

    <div class="set-section-title">Grown-up PIN</div>
    <input class="set-pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" value="${escapeHtml(d.pin)}" oninput="setPin(this.value)">

    <label class="set-mute">
      <span>🔔 Sounds &amp; chimes</span>

      <button type="button" class="set-seg-btn ${d.theme === 'light' ? 'on' : ''}" onclick="setTheme('light', this)">☀️ Light</button>
      <button type="button" class="set-seg-btn ${d.theme === 'dark' ? 'on' : ''}" onclick="setTheme('dark', this)">🌙 Dark</button>
    </div>

    <div class="set-section-title">Birthday surprise</div>
    <div class="date-label">Optional — a once-a-year celebration on this day. Leave blank to turn it off.</div>

    <div class="set-msg" id="setMsg"></div>
    <button class="set-save" onclick="saveSettings()">Save settings</button>
  `;

// Live edits mutate the draft only; structural changes (add/remove) re-render the form.
function setTaskField(routine, i, field, val) { if (settingsDraft.tasks[routine][i]) settingsDraft.tasks[routine][i][field] = val; }
function setMsField(i, field, val) { if (settingsDraft.milestones[i]) settingsDraft.milestones[i][field] = val; }
function setTime(which, val) { settingsDraft.times[which] = val; }
function setBirthday(val) { settingsDraft.birthday = val; }
function setPin(val) { settingsDraft.pin = val.replace(/\D/g, '').slice(0, 4); }
function addTask(routine) { settingsDraft.tasks[routine].push({ id: genTaskId(), label: '', emoji: '⭐' }); renderParentPanel(); }
function removeTask(routine, i) { settingsDraft.tasks[routine].splice(i, 1); renderParentPanel(); }
function toggleMute(btn) { settingsDraft.muted = !settingsDraft.muted; btn.classList.toggle('on', !settingsDraft.muted); }
// Live-preview the theme as the parent taps; persisted only on Save. An unsaved preview is
// reverted to the saved theme when the panel closes or the tab switches away (see below).
function setTheme(val, btn) {
  settingsDraft.theme = val;
  applyTheme(val);
  if (btn) { btn.parentElement.querySelectorAll('.set-seg-btn').forEach(b => b.classList.remove('on')); btn.classList.add('on'); }
}

function setSettingsMsg(msg, ok) {
  const el = document.getElementById('setMsg');
  if (el) { el.textContent = msg; el.className = 'set-msg' + (ok ? ' ok' : ' err'); }
}

function saveSettings() {
  const draft = settingsDraft;
  // tidy tasks: trim labels, drop empty rows, default a missing emoji
  ['morning', 'bedtime'].forEach(r => {
    draft.tasks[r] = draft.tasks[r]
      .map(t => ({ id: t.id || genTaskId(), label: (t.label || '').trim(), emoji: (t.emoji || '').trim() || '⭐' }))
      .filter(t => t.label.length > 0);
  });
  if (draft.tasks.morning.length + draft.tasks.bedtime.length === 0) { setSettingsMsg('Add at least one task.'); return; }
  const pin = (draft.pin || '').replace(/\D/g, '');
  if (pin.length !== 4) { setSettingsMsg('PIN must be exactly 4 digits.'); return; }
  draft.pin = pin;
  draft.milestones = draft.milestones.map(ms => ({
    days: ms.days, key: ms.key,
    icon: (ms.icon || '').trim() || '⭐',
    label: (ms.label || '').trim() || `${ms.days}-star prize`
  }));
  ['morning', 'bedtime'].forEach(w => { if (!/^\d{1,2}:\d{2}$/.test(draft.times[w] || '')) draft.times[w] = DEFAULT_TIMES[w]; });

  const state = ensureToday(loadState());
  state.settings = clone(draft);
  applySettingsToToday(state);   // re-sync today to the new task set (past days untouched)
  syncDerived(state);
  saveState(state);
  render(state);

  settingsDraft = clone(state.settings);
  renderParentPanel();           // rebuild form with the cleaned values
  setSettingsMsg('Saved! ✓', true);
}

// Re-point TODAY at the live task set, preserving checks for tasks that survived the edit.
function applySettingsToToday(state) {
  const today = getToday();
  const day = state.days[today];
  if (!day) return;
  const defs = clone(state.settings.tasks);
  const newTasks = {};
  defs.morning.concat(defs.bedtime).forEach(t => { newTasks[t.id] = !!day.tasks[t.id]; });
  day.tasks = newTasks;
  day.taskDefs = defs;
}

function buildCalendarCells(state, today) {
  const year = pzMonth.getFullYear(), month = pzMonth.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let cells = '';
  for (let i = 0; i < firstDow; i++) cells += `<div class="pz-day empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const k = dateKey(new Date(year, month, day));
    const d = state.days[k];
    const isFuture = k > today;
    let status = 'none';
    if (d) status = dayStarred(d) ? 'approved' : (((d.checks && (d.checks.morning || d.checks.bedtime)) || Object.values(d.tasks).some(Boolean)) ? 'partial' : 'none');
    const cls = ['pz-day', isFuture ? 'future' : status, k === today ? 'today' : '', k === pzSelected ? 'selected' : ''].filter(Boolean).join(' ');
    const click = isFuture ? '' : `onclick="pzSelect('${k}')"`;
    const mark = (!isFuture && status === 'approved') ? `<span class="pz-star">★</span>` : '';
    cells += `<div class="${cls}" ${click}><span class="pz-daynum">${day}</span>${mark}</div>`;
  }
  return cells;
}

function buildDayDetail(state, key, today) {
  const d = state.days[key] || null;
  const tasks = (d && d.tasks) || {};
  const defs = (d && d.taskDefs) || state.settings.tasks;   // each day shows its own frozen task set
  const label = parseKey(key).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const cm = !!(d && d.checks && d.checks.morning);
  const cb = !!(d && d.checks && d.checks.bedtime);
  const allDefs = defs.morning.concat(defs.bedtime);
  const done = allDefs.filter(t => tasks[t.id]).length;
  const rows = (list) => list.map(t => `
    <div class="pz-task ${tasks[t.id] ? 'done' : ''}" onclick="pzToggleTask('${key}','${t.id}')">
      <span class="pz-task-box">${tasks[t.id] ? '✓' : ''}</span>
      <span class="pz-task-lbl">${escapeHtml(t.emoji)} ${escapeHtml(t.label)}</span>
    </div>`).join('');
  return `
    <div class="pz-day-detail">
      <div class="pz-detail-head">
        <div class="pz-detail-date">${label}${key === today ? ' · Today' : ''}</div>
        <div class="pz-detail-count">${done}/${allDefs.length} done</div>
      </div>
      ${defs.morning.length ? `<div class="pz-detail-grouplbl">☀️ Morning</div>${rows(defs.morning)}` : ''}
      ${defs.bedtime.length ? `<div class="pz-detail-grouplbl">🌙 Bedtime</div>${rows(defs.bedtime)}` : ''}
      <div class="pz-checks">
        <button class="pz-check-toggle ${cm ? 'on' : ''}" onclick="pzToggleCheck('${key}','morning')">${cm ? '☀️ Morning ✓' : '☀️ Mark morning'}</button>
        <button class="pz-check-toggle ${cb ? 'on' : ''}" onclick="pzToggleCheck('${key}','bedtime')">${cb ? '🌙 Bedtime ✓' : '🌙 Mark bedtime'}</button>
      </div>
    </div>`;
}

function pzNav(delta) {
  pzMonth = new Date(pzMonth.getFullYear(), pzMonth.getMonth() + delta, 1);
  renderParentPanel();
}

function pzSelect(key) {
  pzSelected = key;
  renderParentPanel();
}

function pzToggleTask(key, taskId) {
  const state = ensureToday(loadState());
  if (!state.days[key]) state.days[key] = freshDayState(state.settings);
  state.days[key].tasks[taskId] = !state.days[key].tasks[taskId];
  syncDerived(state);
  saveState(state);
  render(state);
  renderParentPanel();
}

function pzToggleCheck(key, which) {
  const state = ensureToday(loadState());
  if (!state.days[key]) state.days[key] = freshDayState(state.settings);
  const day = state.days[key];
  if (!day.checks) day.checks = { morning: false, bedtime: false };
  day.checks[which] = !day.checks[which];
  syncDerived(state);
  saveState(state);
  render(state);
  renderParentPanel();
}

// Parent hands a prize over — increment the ledger by one, never past what's earned.
function pzGivePrize(key) {
  const state = ensureToday(loadState());
  syncDerived(state);
  const c = prizeCounts(state)[key];
  if (c && c.owed > 0) state.prizesGiven[key] = Math.min(c.earned, (state.prizesGiven[key] || 0) + 1);
  syncDerived(state);
  saveState(state);
  render(state);
  renderParentPanel();
}

// Clear the whole owed pile for one prize at once.
function pzGiveAllPrize(key) {
  const state = ensureToday(loadState());
  syncDerived(state);
  const c = prizeCounts(state)[key];
  if (c) state.prizesGiven[key] = c.earned;
  syncDerived(state);
  saveState(state);
  render(state);
  renderParentPanel();
}

// Undo a hand-over (fat-finger), floored at zero so owed never goes negative.
function pzUndoPrize(key) {
  const state = ensureToday(loadState());
  state.prizesGiven[key] = Math.max(0, (state.prizesGiven[key] || 0) - 1);
  syncDerived(state);
  saveState(state);
  render(state);
  renderParentPanel();
}

function closeParentZone() {
  document.getElementById('parentOverlay').style.display = 'none';
  const s = loadState(); applyTheme((s && s.settings && s.settings.theme) || 'auto');  // revert any unsaved theme preview
}

document.getElementById('parentOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('parentOverlay')) closeParentZone();
});

// Each routine is checked by a grown-up via the PIN flow → approveRoutineAfterPin(which).
// The Parent Dashboard keeps retroactive editing of any day's checks (see pzToggleCheck).

// ═══════ CELEBRATION ═══════
let claimKey = null;
function openClaim(key) {
  const state = ensureToday(loadState());
  const ms = state.settings.milestones.find(m => m.key === key);
  if (!ms) return;
  const owed = prizeCounts(state)[key].owed;
  if (owed <= 0) return;                  // nothing waiting — guard against a stale tap
  resetCelebrationUI();
  claimKey = key;
  document.getElementById('celebIcon').textContent = ms.icon;
  document.getElementById('celebTitle').textContent = owed > 1 ? `${owed} prizes ready! 🎁` : `${ms.days}-Star Prize!`;
  document.getElementById('celebText').textContent = owed > 1 ? `You have ${owed} × ${ms.label} waiting!` : `You earned: ${ms.label}`;
  const action = document.getElementById('celebActionBtn');
  action.textContent = 'Show a grown-up! 🎁';
  action.onclick = claimMilestone;      // reclaim the shared button from any prior dad-note gate
  action.disabled = false;
  action.style.display = '';
  document.querySelector('.celebration-close').textContent = 'Maybe later';
  document.getElementById('celebration').classList.add('show');
  spawnConfetti();
  chimeDay();
  buzz([30, 40, 30, 40, 70]);
}

// Claiming is a kid ritual only — handing the prize over (the ledger write) is the parent's action.
function claimMilestone() {
  if (!claimKey) return;
  claimKey = null;
  document.getElementById('celebTitle').textContent = 'Yay!';
  document.getElementById('celebText').textContent = 'Show a grown-up to get your prize! 🎉';
  document.getElementById('celebActionBtn').style.display = 'none';
  document.querySelector('.celebration-close').textContent = 'Okay! ⭐';
}

function spawnConfetti(colors) {
  // JS-spawned motion must check reduced-motion itself — the global CSS rule can't reach it.
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const wrap = document.getElementById('celebration');
  wrap.querySelectorAll('.confetti-piece').forEach(p => p.remove());
  colors = colors || ['#FFC83C', '#F2A23A', '#E8972E', '#8BBE72', '#C9B6EC', '#FFE488', '#FFFDF8'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const s = 7 + Math.floor(Math.random() * 7);
    p.style.left = Math.random() * 100 + '%';
    if (i % 4 === 0) {                       // every 4th piece is a little star
      p.classList.add('cstar');
      p.textContent = '★';
      p.style.color = colors[i % colors.length];
      p.style.fontSize = (s + 6) + 'px';
    } else {
      p.style.width = s + 'px';
      p.style.height = s + 'px';
      p.style.background = colors[i % colors.length];
      p.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
    }
    if (i % 2 === 0) p.classList.add('sway'); // half the pieces drift side to side as they fall
    p.style.animationDelay = (Math.random() * 0.6) + 's';
    p.style.animationDuration = (2.2 + Math.random() * 1.4) + 's';
    frag.appendChild(p);
  }
  wrap.appendChild(frag);
}

// Reset the shared overlay to a clean base so claim / day-complete / PIN / star-earned
// modes never leak UI into one another.
function resetCelebrationUI() {
  if (dadNoteTimer) { clearInterval(dadNoteTimer); dadNoteTimer = null; }   // kill any running read-gate countdown
  document.getElementById('pinPad').style.display = 'none';
  document.getElementById('pinMsg').textContent = '';
  const action = document.getElementById('celebActionBtn');
  action.style.display = 'none';
  action.disabled = false;
  action.onclick = null;                 // drop any dad-note/claim handler so it can't leak between modes
  document.querySelector('.celebration-close').textContent = 'Awesome! ⭐';
  document.getElementById('celebration').querySelectorAll('.confetti-piece').forEach(p => p.remove());
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  resetCelebrationUI();
  claimKey = null;
  pinMode = null;
  pinEntry = '';
  // a star banked while the overlay covered the jar — let the kid watch it drop in now
  if (_jarFxQueued) { playJarEntrances(); popJar(); }
}

// ═══════ RESET ═══════
function confirmReset() {
  if (confirm('This will erase all data for this profile. Are you sure?')) {
    localStorage.removeItem('starjar_state');
    location.reload();
  }
}

// Streak + totals are derived from the day history (see syncDerived) and computed on load in INIT.

// ═══════ PWA: register service worker ═══════
// Guarded so it no-ops on file:// (only registers over http/https).
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
